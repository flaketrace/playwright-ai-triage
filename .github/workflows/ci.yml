name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
      # engines claims node >=18; dev tooling needs 22, so smoke-test the built
      # artifact itself on the minimum supported runtime.
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: node -e "require('./dist/index.cjs')" && node -e "import('./dist/index.js')"

  integration:
    runs-on: ubuntu-latest
    # the dry-run examples suite doubles as a live demo: it posts (and upserts)
    # the triage comment on our own PRs — dogfooding the github output on every change
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm install
        working-directory: examples/gh-actions-demo
      - run: npx playwright install --with-deps chromium
        working-directory: examples/gh-actions-demo
      - name: Run the examples suite with dryRun (failures are the point)
        working-directory: examples/gh-actions-demo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          npx playwright test > output.log 2>&1
          status=$?
          set -e
          cat output.log
          if [ "$status" -eq 0 ]; then
            echo "expected the demo suite to fail"; exit 1
          fi
          grep -q "failure(s) triaged" output.log
          grep -q "ENV_ISSUE" output.log
          grep -q "FLAKY" output.log
          grep -q "dry-run mode" output.log

  tarball-smoke:
    runs-on: ubuntu-latest
    # Installs the reporter from a freshly packed .tgz (not the file:../.. symlink
    # the demo uses) into a project that has NO dependency on it — proving the
    # published `files` surface resolves and the bare-string reporter config runs.
    # No dryRun, no ANTHROPIC_API_KEY: exercises the graceful-degradation path.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack the reporter
        run: npm pack --pack-destination /tmp
      - name: Install the packed tarball into the smoke project
        working-directory: examples/tarball-smoke
        run: npm install --no-save /tmp/playwright-ai-triage-*.tgz @playwright/test@^1.61.1
      - name: Run the smoke suite (failure is expected, no API key)
        working-directory: examples/tarball-smoke
        run: |
          set +e
          npx playwright test > output.log 2>&1
          status=$?
          set -e
          cat output.log
          if [ "$status" -eq 0 ]; then
            echo "expected the smoke suite to fail"; exit 1
          fi
          # bare-string reporter resolved from the packed artifact and ran, then
          # degraded cleanly with no API key
          grep -q "playwright-ai-triage" output.log
          grep -q "not classified" output.log
          grep -q "ANTHROPIC_API_KEY" output.log
