name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  dco:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # every PR commit must carry a Signed-off-by trailer (DCO 1.1 — see CONTRIBUTING.md);
    # checked inline rather than via a third-party action to keep the supply chain minimal.
    # Two bots are exempt: github-actions[bot] (changesets "Version Packages" PRs) and
    # dependabot[bot] (dependency bumps). Neither is a contribution with an author who
    # could certify origin, and without the exemption every automated PR is born red.
    # Exact addresses only, and quoted so "[bot]" is literal rather than a glob character
    # class that would also match e.g. github-actionsb@... . Author email is self-asserted,
    # so this is not an access control — DCO is a certification ceremony, and the exemption
    # just keeps it from blocking commits no human authored.
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on every PR commit
        env:
          BASE: ${{ github.event.pull_request.base.sha }}
          HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          commits=$(git rev-list --no-merges "$BASE".."$HEAD")
          if [ -z "$commits" ]; then
            echo "no non-merge commits in range — nothing to check"
            exit 0
          fi
          missing=0
          for sha in $commits; do
            author=$(git log -1 --format='%ae' "$sha")
            case "$author" in
              '41898282+github-actions[bot]@users.noreply.github.com' | '49699333+dependabot[bot]@users.noreply.github.com')
                echo "skipping automation commit $(git log -1 --format='%h %s' "$sha")"
                continue
                ;;
            esac
            if ! git log -1 --format='%(trailers:key=Signed-off-by,valueonly)' "$sha" | grep -q .; then
              echo "::error::commit $sha has no Signed-off-by trailer — fix with 'git commit --amend -s' (or 'git rebase --signoff' for multiple commits)"
              git log -1 --format='%h %s' "$sha"
              missing=1
            fi
          done
          exit $missing

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

      # The sync pipeline's trust-boundary helper is Python. Deliberately NOT in
      # `npm run gate` — this is a Node package and contributors should not need a
      # Python toolchain for the gate. Runs last so a pip hiccup cannot fail the
      # Node build; venv mirrors second-brain-sync.yml rather than installing into
      # the runner's system Python. PyYAML is the only import-time dependency —
      # the Anthropic SDK is imported lazily inside main().
      - name: Test sync scripts
        run: |
          python3 -m venv --clear .venv-test
          .venv-test/bin/pip install --quiet 'pyyaml==6.*'
          .venv-test/bin/python3 -m unittest discover -s .github/scripts -p 'test_*.py'
      # engines claims node >=18; dev tooling needs 22, so smoke-test the built
      # artifact itself on the minimum supported runtime.
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - run: node -e "require('./dist/index.cjs')" && node -e "import('./dist/index.js')"

  integration:
    runs-on: ubuntu-latest
    # the dry-run examples suite doubles as a live demo: it posts (and upserts)
    # the triage comment on our own PRs — dogfooding the github output on every change
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm install
        working-directory: examples/gh-actions-demo
      - run: npx playwright install --with-deps chromium
        working-directory: examples/gh-actions-demo
      - name: Run the examples suite with dryRun (failures are the point)
        working-directory: examples/gh-actions-demo
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          npx playwright test > output.log 2>&1
          status=$?
          set -e
          cat output.log
          if [ "$status" -eq 0 ]; then
            echo "expected the demo suite to fail"; exit 1
          fi
          grep -q "failure(s) triaged" output.log
          grep -q "ENV_ISSUE" output.log
          grep -q "FLAKY" output.log
          grep -q "dry-run mode" output.log

  tarball-smoke:
    runs-on: ubuntu-latest
    # Installs the reporter from a freshly packed .tgz (not the file:../.. symlink
    # the demo uses) into a project that has NO dependency on it — proving the
    # published `files` surface resolves and the bare-string reporter config runs.
    # No dryRun, no ANTHROPIC_API_KEY: exercises the graceful-degradation path.
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Pack the reporter
        run: npm pack --pack-destination /tmp
      - name: Install the packed tarball into the smoke project
        working-directory: examples/tarball-smoke
        run: npm install --no-save /tmp/playwright-ai-triage-*.tgz @playwright/test@^1.61.1
      - name: Run the smoke suite (failure is expected, no API key)
        working-directory: examples/tarball-smoke
        run: |
          set +e
          npx playwright test > output.log 2>&1
          status=$?
          set -e
          cat output.log
          if [ "$status" -eq 0 ]; then
            echo "expected the smoke suite to fail"; exit 1
          fi
          # bare-string reporter resolved from the packed artifact and ran, then
          # degraded cleanly with no API key
          grep -q "playwright-ai-triage" output.log
          grep -q "not classified" output.log
          grep -q "ANTHROPIC_API_KEY" output.log
