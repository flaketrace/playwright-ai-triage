name: Release

# Changesets release flow. With pending changesets, a push to main opens/updates
# the "Version Packages" PR; with none, `changeset publish` runs directly and
# publishes any version not yet on npm. Publishing authenticates via npm
# TRUSTED PUBLISHING (OIDC, `id-token: write` + the publisher configured on
# npmjs for this repo/workflow) — no npm token exists in this repo. The npm CLI
# must be ≥ 11.5 for the OIDC exchange, hence the explicit upgrade step.
# Provenance comes from CI OIDC.

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency: release-${{ github.ref }}

jobs:
  release:
    if: github.repository == 'flaketrace/playwright-ai-triage'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # OIDC trusted publishing requires npm >= 11.5 (Node 22 bundles 10.x)
      - run: npm install -g npm@11 && npm --version
      - run: npm ci
      - uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: 'true'
