name: Feature request
description: Something the reporter should do that it doesn't
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: >-
        Check [docs/ROADMAP.md](https://github.com/flaketrace/playwright-ai-triage/blob/main/docs/ROADMAP.md)
        first — it may already be planned, in which case an issue saying it matters to you moves it
        up. PRs are welcome; see
        [CONTRIBUTING.md](https://github.com/flaketrace/playwright-ai-triage/blob/main/CONTRIBUTING.md).

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do, and where does the reporter fall short today?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed solution
      description: What you'd like to happen. Config sketch or example output welcome.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Workarounds you use now, or other shapes this could take.
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      description: Anything else worth knowing.
    validations:
      required: false
